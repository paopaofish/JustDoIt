version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: monitor_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: monitor_db
      MYSQL_USER: monitor
      MYSQL_PASSWORD: monitor123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - monitor_network
    restart: unless-stopped

  # IoTDB (Optional)
  iotdb:
    image: apache/iotdb:1.3.0
    container_name: monitor_iotdb
    ports:
      - "6667:6667"
      - "9703:9703"
      - "8082:8082"
    volumes:
      - iotdb_data:/opt/iotdb/data
    networks:
      - monitor_network
    restart: unless-stopped

  # Backend Application
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: monitor_backend
    ports:
      - "8081:8080"
    depends_on:
      - mysql
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/monitor_db?useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: monitor
      SPRING_DATASOURCE_PASSWORD: monitor123
    networks:
      - monitor_network
    restart: unless-stopped

  # Frontend Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: monitor_frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - monitor_network
    restart: unless-stopped

volumes:
  mysql_data:
  iotdb_data:

networks:
  monitor_network:
    driver: bridge
