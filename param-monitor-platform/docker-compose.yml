version: '3.8'

services:
  # PostgreSQL 数据库 (元数据存储)
  postgres:
    image: postgres:15-alpine
    container_name: param-monitor-postgres
    environment:
      POSTGRES_DB: param_monitor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - param-monitor-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (缓存与消息队列)
  redis:
    image: redis:7-alpine
    container_name: param-monitor-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - param-monitor-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # IoTDB (时序数据库)
  iotdb:
    image: apache/iotdb:1.3.0
    container_name: param-monitor-iotdb
    ports:
      - "6667:6667"
      - "9703:9703"
      - "8081:8081"
    volumes:
      - iotdb_data:/iotdb/data
    networks:
      - param-monitor-net
    environment:
      - IOTDB_CONF=/iotdb/conf

  # 后端 API 服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: param-monitor-backend
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=param_monitor
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - IOTDB_HOST=iotdb
      - IOTDB_PORT=6667
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      iotdb:
        condition: service_started
    volumes:
      - ./backend:/app
    networks:
      - param-monitor-net
    restart: unless-stopped

  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: param-monitor-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - param-monitor-net
    restart: unless-stopped

  # Celery Worker (异步任务)
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: param-monitor-celery
    command: celery -A app.celery worker --loglevel=info
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=param_monitor
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      - redis
      - postgres
    volumes:
      - ./backend:/app
    networks:
      - param-monitor-net
    restart: unless-stopped

networks:
  param-monitor-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  iotdb_data:
